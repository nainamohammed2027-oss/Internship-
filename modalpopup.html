<!doctype html>
<html>
<body>
    <button onclick="openPop()">Open Pop-up</button>
    <div id="pop" style="display:none; background:light gray;">
        <p>This is a pop-up!</p>
    </div>
    <script>
        function openPop() {
            document.getElementById("pop").style.display = "none";
        }
    </script>
</body>
</html>
