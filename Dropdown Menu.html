<!DOCTYPE html>
<html>
    <head>
        <title>Dropdown</title>
        <style>
            dropdown:hover menu{
                display: block;
            }
            menu{
                display: none;
            }
        </style>
        <div class="dropdown">
            menu
            <div class="menu">
                <p>item1</p>
                <p>item2</p>
            </div>
        </div>
    </head>

</html>
